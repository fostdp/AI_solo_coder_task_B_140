    modern-bulk-panamax:
      ship-category: MODERN
      ship-family: 散货船
      ship-variant: Panamax (75000DWT)
      length-overall: 225.0
      breadth-molded: 32.2
      depth-molded: 18.5
      design-draft: 12.5
      displacement: 90000.0
      lightship-weight: 15000.0
      deadweight-tons: 75000.0
      block-coefficient: 0.83
      roll-radius-coefficient: 0.45
      bow-height: 22.0
