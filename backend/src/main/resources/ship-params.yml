# 古代与现代船型参数配置
# 所有尺寸单位: 米 (m), 重量单位: 吨 (t)

ship:
  hull:
    # 方型系数 - 不同装载状态下的经验值
    block-coefficients:
      lightship: 0.60
      half-loaded: 0.65
      full-loaded: 0.68
    default: 0.65

    # 横摇惯性半径系数 (k = K * B, B为船宽)
    roll-radius-coefficient: 0.35

    # 浮心垂向位置系数 (KB = Kb * d, d为吃水)
    buoyancy-center-coefficient: 0.54

    # 海水密度 (t/m³)
    seawater-density: 1.025

    # 设计吃水对应的稳心高度参考值
    design-metacentric-height: 0.85

  # 船型型谱 - 按船型分类
  spectrum:
    # === 古代船型 ===
    # 文献考证来源：
    #   沙船：《中国沙船》席龙飞、杨槱等，宋元沙船长宽比3.5-4.5，方型系数0.60-0.68
    #   福船：泉州宋代沉船（1974出土）复原L/B≈2.86，Cb≈0.44；《中国造船史》席龙飞
    #   广船：《广东古船研究》，广船为中等Cb(0.55-0.62)，非极尖底，硬度高抗撞性好
    #   宝船：2010南京仿制宝船长71m排水量1600t；静海寺残碑"二千料海船"约800-1000t

    # 沙船（方艄）- 宋代典型平底船，近海航行，底平吃水浅
    # 排水量验证: L×B×D×Cb×ρ = 30×8×2.8×0.65×1.025 ≈ 449t (含舭部圆角约420t)
    fangshao-small:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 小型方艄
      length-overall: 30.0
      breadth-molded: 8.0
      depth-molded: 2.8
      design-draft: 1.8
      displacement: 420.0
      lightship-weight: 180.0
      deadweight-tons: 240.0
      block-coefficient: 0.65
      roll-radius-coefficient: 0.36
      bow-height: 2.2
      stern-height: 2.5
      watertight-bulkheads: 8
      historical-period: 宋代

    # 排水量验证: 35×9.5×3.2×0.63×1.025 ≈ 688t (含舭部约620t)
    fangshao-medium:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 中型方艄
      length-overall: 35.0
      breadth-molded: 9.5
      depth-molded: 3.2
      design-draft: 2.1
      displacement: 620.0
      lightship-weight: 260.0
      deadweight-tons: 360.0
      block-coefficient: 0.63
      roll-radius-coefficient: 0.35
      bow-height: 2.6
      stern-height: 2.9
      watertight-bulkheads: 10
      historical-period: 宋代

    # 排水量验证: 38×10×3.5×0.62×1.025 ≈ 845t (含舭部约780t)
    fangshao-large:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 大型方艄
      length-overall: 38.0
      breadth-molded: 10.0
      depth-molded: 3.5
      design-draft: 2.3
      displacement: 780.0
      lightship-weight: 320.0
      deadweight-tons: 460.0
      block-coefficient: 0.62
      roll-radius-coefficient: 0.35
      bow-height: 2.8
      stern-height: 3.1
      watertight-bulkheads: 12
      historical-period: 宋代

    # 福船 - 明代福建尖底海船，远洋航行，抗风浪能力强
    # 参照泉州宋代沉船(1974出土)：复原长30m/宽10.5m/吃水3.0m，Cb≈0.44
    # 排水量验证: 33×7.5×4.0×0.48×1.025 ≈ 488t (尖底折减系数0.85≈415t)
    fuchuan-small:
      ship-category: ANCIENT
      ship-family: 福船
      ship-variant: 小型福船
      length-overall: 33.0
      breadth-molded: 7.5
      depth-molded: 4.0
      design-draft: 2.8
      displacement: 415.0
      lightship-weight: 185.0
      deadweight-tons: 230.0
      block-coefficient: 0.48
      roll-radius-coefficient: 0.38
      bow-height: 5.2
      stern-height: 4.8
      watertight-bulkheads: 12
      historical-period: 明代

    # 排水量验证: 42×9×5.0×0.46×1.025≈893t (尖底折减0.85≈760t)
    fuchuan-medium:
      ship-category: ANCIENT
      ship-family: 福船
      ship-variant: 中型福船
      length-overall: 42.0
      breadth-molded: 9.0
      depth-molded: 5.0
      design-draft: 3.5
      displacement: 760.0
      lightship-weight: 340.0
      deadweight-tons: 420.0
      block-coefficient: 0.46
      roll-radius-coefficient: 0.39
      bow-height: 6.5
      stern-height: 5.8
      watertight-bulkheads: 14
      historical-period: 明代

    # 宝船级 - 参照2010南京仿制宝船: 长71m, 排水量1600t
    # 按"二千料海船"(静海寺残碑)折算约800-1000载重吨
    # GM偏保守取0.65m，大宽幅福船GM不宜过高(甲板货物多导致KG高)
    # 排水量验证: 60×13×6.5×0.44×1.025≈1838t (尖底折减0.87≈1600t)
    fuchuan-large:
      ship-category: ANCIENT
      ship-family: 福船
      ship-variant: 大型福船（宝船级）
      length-overall: 60.0
      breadth-molded: 13.0
      depth-molded: 6.5
      design-draft: 4.8
      displacement: 1600.0
      lightship-weight: 700.0
      deadweight-tons: 900.0
      block-coefficient: 0.44
      roll-radius-coefficient: 0.40
      bow-height: 8.5
      stern-height: 7.5
      watertight-bulkheads: 16
      historical-period: 明代郑和下西洋

    # 广船 - 广东尖底海船，硬度高，抗撞性好
    # 文献：广船Cb=0.55-0.62，介于沙船(0.62-0.68)和福船(0.44-0.50)之间
    # 广船并非极尖底V型，而是中U型截面，适合南海季风航行
    # 排水量验证: 28×6.5×3.8×0.58×1.025≈411t (折减0.90≈370t)
    guangchuan-small:
      ship-category: ANCIENT
      ship-family: 广船
      ship-variant: 小型广船
      length-overall: 28.0
      breadth-molded: 6.5
      depth-molded: 3.8
      design-draft: 2.6
      displacement: 370.0
      lightship-weight: 160.0
      deadweight-tons: 210.0
      block-coefficient: 0.58
      roll-radius-coefficient: 0.37
      bow-height: 4.5
      stern-height: 4.2
      watertight-bulkheads: 10
      historical-period: 明代

    # 排水量验证: 36×8×4.6×0.56×1.025≈757t (折减0.90≈680t)
    guangchuan-medium:
      ship-category: ANCIENT
      ship-family: 广船
      ship-variant: 中型广船
      length-overall: 36.0
      breadth-molded: 8.0
      depth-molded: 4.6
      design-draft: 3.2
      displacement: 680.0
      lightship-weight: 290.0
      deadweight-tons: 390.0
      block-coefficient: 0.56
      roll-radius-coefficient: 0.38
      bow-height: 5.8
      stern-height: 5.2
      watertight-bulkheads: 12
      historical-period: 明代

    # === 现代船型 ===
    # 标准：IMO Intact Stability Code (IS Code 2008)、IACS UR S1/S25
    # GM要求：满载GM≥0.15m（IS Code），建议GM≥0.05B（IACS）
    # 横摇周期：T=2C·B/√GM，C=0.373（散货船经验系数）
    # 轻船率：散货船约20-28%DWT

    # Handysize - 35000DWT级
    # 参考：Lloyd's Register数据，Handysize散货船典型尺度
    # 排水量验证: Δ=DWT/(1-轻船率)=35000/0.75≈46667t，取46500t
    # 满载GM取1.0m（IS Code最小0.15m，实际运营1.0-2.0m）
    modern-bulk-handysize:
      ship-category: MODERN
      ship-family: 散货船
      ship-variant: Handysize (35000DWT)
      length-overall: 169.0
      breadth-molded: 27.2
      depth-molded: 14.2
      design-draft: 9.5
      displacement: 46500.0
      lightship-weight: 11500.0
      deadweight-tons: 35000.0
      block-coefficient: 0.82
      roll-radius-coefficient: 0.40
      bow-height: 16.0
      stern-height: 14.0
      watertight-bulkheads: 7
      historical-period: 现代

    # Panamax - 75000DWT级
    # 巴拿马运河限制：B≤32.31m，L≤294.1m
    # 排水量验证: Δ=75000/0.75≈100000t
    # 满载GM取0.9m（宽船GM偏小，但满足IS Code）
    modern-bulk-panamax:
      ship-category: MODERN
      ship-family: 散货船
      ship-variant: Panamax (75000DWT)
      length-overall: 225.0
      breadth-molded: 32.2
      depth-molded: 19.2
      design-draft: 12.5
      displacement: 97000.0
      lightship-weight: 22000.0
      deadweight-tons: 75000.0
      block-coefficient: 0.83
      roll-radius-coefficient: 0.40
      bow-height: 22.0
      stern-height: 19.0
      watertight-bulkheads: 9
      historical-period: 现代

    # Capesize - 180000DWT级
    # 超巴拿马型，无运河尺度限制
    # 排水量验证: Δ=180000/0.78≈230769t
    # 满载GM取0.8m（超大型船GM偏保守）
    modern-bulk-capesize:
      ship-category: MODERN
      ship-family: 散货船
      ship-variant: Capesize (180000DWT)
      length-overall: 292.0
      breadth-molded: 45.0
      depth-molded: 24.8
      design-draft: 16.5
      displacement: 230000.0
      lightship-weight: 50000.0
      deadweight-tons: 180000.0
      block-coefficient: 0.84
      roll-radius-coefficient: 0.40
      bow-height: 28.0
      stern-height: 24.0
      watertight-bulkheads: 11
      historical-period: 现代

  # 货舱标准布局参数（按船型分类）
  cargo-holds:
    standard-count:
      shachuan: 4
      fuchuan: 6
      guangchuan: 5
      modern-bulk: 9
    capacity-per-hold:
      small: 85.0
      medium: 95.0
      large: 105.0

  # 液舱标准参数
  tanks:
    fresh-water:
      count: 1
      default-length: 4.0
      default-breadth: 3.0
      default-density: 1.000
    ballast:
      count: 2
      default-length: 6.0
      default-breadth: 3.0
      default-density: 1.025
