  # 货舱标准布局参数（按船型分类）
  cargo-holds:
    standard-count:
      shachuan: 4
      fuchuan: 6
      guangchuan: 5
      modern-bulk: 9
    capacity-per-hold:
      small: 85.0
      medium: 95.0
      large: 105.0

  # 液舱标准参数
  tanks:
    fresh-water:
      count: 1
      default-length: 4.0
      default-breadth: 3.0
      default-density: 1.000
    ballast:
      count: 2
      default-length: 6.0
      default-breadth: 3.0
      default-density: 1.025
