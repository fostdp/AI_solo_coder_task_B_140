# 古代与现代船型参数配置
# 所有尺寸单位: 米 (m), 重量单位: 吨 (t)

ship:
  hull:
    # 方型系数 - 不同装载状态下的经验值
    block-coefficients:
      lightship: 0.60
      half-loaded: 0.65
      full-loaded: 0.68
    default: 0.65

    # 横摇惯性半径系数 (k = K * B, B为船宽)
    roll-radius-coefficient: 0.35

    # 浮心垂向位置系数 (KB = Kb * d, d为吃水)
    buoyancy-center-coefficient: 0.54

    # 海水密度 (t/m³)
    seawater-density: 1.025

    # 设计吃水对应的稳心高度参考值
    design-metacentric-height: 0.85

  # 船型型谱 - 按船型分类
  spectrum:
    # === 古代船型 ===
    # 沙船（方艄）- 宋代典型平底船，近海航行
    fangshao-small:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 小型方艄
      length-overall: 30.0
      breadth-molded: 8.0
      depth-molded: 2.8
      design-draft: 1.8
      displacement: 320.0
      lightship-weight: 140.0
      deadweight-tons: 180.0
      block-coefficient: 0.68
      roll-radius-coefficient: 0.36
      bow-height: 2.2
      stern-height: 2.5
      watertight-bulkheads: 8
      historical-period: 宋代

    fangshao-medium:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 中型方艄
      length-overall: 35.0
      breadth-molded: 9.5
      depth-molded: 3.2
      design-draft: 2.1
      displacement: 420.0
      lightship-weight: 180.0
      deadweight-tons: 240.0
      block-coefficient: 0.66
      roll-radius-coefficient: 0.35
      bow-height: 2.6
      stern-height: 2.9
      watertight-bulkheads: 10
      historical-period: 宋代

    fangshao-large:
      ship-category: ANCIENT
      ship-family: 沙船
      ship-variant: 大型方艄
      length-overall: 38.0
      breadth-molded: 10.0
      depth-molded: 3.5
      design-draft: 2.3
      displacement: 520.0
      lightship-weight: 210.0
      deadweight-tons: 310.0
      block-coefficient: 0.65
      roll-radius-coefficient: 0.35
      bow-height: 2.8
      stern-height: 3.1
      watertight-bulkheads: 12
      historical-period: 宋代

    # 福船 - 明代福建尖底海船，远洋航行，抗风浪能力强
    fuchuan-small:
      ship-category: ANCIENT
      ship-family: 福船
      ship-variant: 小型福船
      length-overall: 33.0
      breadth-molded: 7.5
      depth-molded: 4.0
      design-draft: 2.8
      displacement: 380.0
      lightship-weight: 170.0
      deadweight-tons: 210.0
      block-coefficient: 0.52
      roll-radius-coefficient: 0.38
      bow-height: 5.2
      stern-height: 4.8
      watertight-bulkheads: 12
      historical-period: 明代

    fuchuan-medium:
