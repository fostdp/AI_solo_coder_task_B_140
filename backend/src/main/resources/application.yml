server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: sand-ship-stability-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sand_ship_stability}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false

  mqtt:
    url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
    client-id: sand-ship-backend
    username: ${MQTT_USER:admin}
    password: ${MQTT_PASSWORD:password}
    topics:
      - ship/+/sensor/#
    completion-timeout: 5000
    connection-timeout: 30000
    keep-alive-interval: 60

  websocket:
    endpoint: /ws/stability
    allowed-origins: "*"
    heartbeat-interval: 30000

stability:
  min-gm-threshold: 0.3
  critical-gm-threshold: 0.15
  max-roll-angle: 15.0
  critical-roll-angle: 25.0
  max-bilge-water: 0.5
  critical-bilge-water: 1.0
  calculation-interval: 60000
  curve-step: 1.0
  curve-max-angle: 60.0

loading:
  default-min-gm: 0.3
  optimization-timeout: 30000
  max-iterations: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
  health:
    defaults:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
    - http://127.0.0.1:3000
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.sandship: ${LOG_LEVEL:DEBUG}
    org.springframework.integration.mqtt: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/sand-ship-stability.log
    max-size: 10MB
    max-history: 30
