version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sandship-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sand_ship_stability
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d sand_ship_stability"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sandship-net

  mqtt:
    image: eclipse-mosquitto:2
    container_name: sandship-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sandship-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sandship-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sand_ship_stability
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_SIZE: 15
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USER: admin
      MQTT_PASSWORD: password
      LOG_LEVEL: INFO
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - sandship-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sandship-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sandship-net

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: sandship-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      REPORT_INTERVAL: ${SIM_INTERVAL:-60}
      CARGO_PRESET: ${CARGO_PRESET:-grain_salt}
      SEA_CONDITION: ${SEA_CONDITION:-moderate}
    depends_on:
      mqtt:
        condition: service_healthy
    networks:
      - sandship-net

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: sandship-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on:
      - backend
    networks:
      - sandship-net

volumes:
  pgdata:
    driver: local
  promdata:
    driver: local

networks:
  sandship-net:
    driver: bridge
